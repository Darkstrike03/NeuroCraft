<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — NeuroCraft</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="dash-header">
    <span class="brand">⛏ NeuroCraft</span>
    <div class="flex gap-2" style="align-items:center">
      <span class="mute" id="username-display"></span>
      <a href="/game.html"   class="btn btn-primary">🌍 Watch World</a>
      <a href="/studio.html" class="btn btn-secondary">🎨 Asset Studio</a>
      <button class="btn btn-secondary" id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Main -->
  <main class="dash-main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <h2 class="section-title" style="margin-bottom:0">Your AI Players</h2>
      <button class="btn btn-accent2" id="add-player-btn">+ Add AI Player</button>
    </div>

    <div class="player-grid" id="players-grid">
      <div class="card" style="text-align:center;color:var(--mute);padding:2rem">
        Loading players…
      </div>
    </div>

    <!-- Local leaderboard (ranked by blocks mined) -->
    <h2 class="section-title" style="margin-top:2.5rem">Leaderboard</h2>
    <div class="card" style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
        <thead>
          <tr style="color:var(--mute);text-align:left">
            <th style="padding:0.5rem 0.75rem">#</th>
            <th style="padding:0.5rem 0.75rem">AI Name</th>
            <th style="padding:0.5rem 0.75rem">Model</th>
            <th style="padding:0.5rem 0.75rem">Blocks Mined</th>
            <th style="padding:0.5rem 0.75rem">Distance</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr><td colspan="5" style="padding:1rem;color:var(--mute)">No data yet.</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Add Player Modal -->
  <div class="modal-backdrop hidden" id="add-modal">
    <div class="modal">
      <div class="modal-title">Add AI Player</div>
      <form id="add-player-form">
        <div class="form-group">
          <label>AI Name <span class="mute">(shown in game)</span></label>
          <input class="input" type="text" name="name" placeholder="GrokMiner3000" required>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
            <input type="checkbox" name="isDemo" id="demo-mode" style="width:1rem;height:1rem;accent-color:var(--accent)">
            <span>Demo Mode <span class="mute">(rule-based bot — no API key needed, free to test)</span></span>
          </label>
        </div>
        <div id="api-key-group" class="form-group">
          <label>API Key <span class="mute">(OpenRouter or any OpenAI-compatible key)</span></label>
          <input class="input" type="password" name="apiKey" placeholder="sk-or-v1-…">
        </div>
        <div id="model-group" class="form-group">
          <label>Model</label>
          <select class="select" name="model">
            <optgroup label="OpenRouter (recommended)">
              <option value="openai/gpt-4o-mini"           selected>GPT-4o mini  (fast, cheap)</option>
              <option value="openai/gpt-4o">GPT-4o (smart)</option>
              <option value="anthropic/claude-3-haiku">Claude 3 Haiku (fast)</option>
              <option value="anthropic/claude-3-5-sonnet">Claude 3.5 Sonnet</option>
              <option value="google/gemini-flash-1.5">Gemini 1.5 Flash</option>
              <option value="meta-llama/llama-3-8b-instruct">Llama 3 8B (free tier)</option>
              <option value="mistralai/mistral-7b-instruct">Mistral 7B (free tier)</option>
            </optgroup>
            <option value="custom">Custom (enter below)</option>
          </select>
        </div>
        <div class="form-group hidden" id="custom-model-group">
          <label>Custom Model ID</label>
          <input class="input" type="text" name="customModel" placeholder="provider/model-name">
        </div>
        <div id="url-group" class="form-group">
          <label>API Base URL <span class="mute">(leave default for OpenRouter)</span></label>
          <input class="input" type="url" name="providerBaseUrl" value="https://openrouter.ai/api/v1">
        </div>
        <div class="form-group">
          <label>Personality <span class="mute">(give your AI a character!)</span></label>
          <textarea class="textarea" name="personality" rows="3"
            placeholder="I am a relentless miner obsessed with finding diamonds. I am cautious but determined."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="add-submit-btn">Spawn AI Player</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { getUser, logout, getPlayers, addPlayer, removePlayer } from '/js/storage.js';

    const username = getUser();
    if (!username) { window.location.replace('/index.html'); }

    document.getElementById('username-display').textContent = username;
    document.getElementById('logout-btn').addEventListener('click', () => {
      logout(); window.location.replace('/index.html');
    });

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show' + (isError ? ' error' : '');
      clearTimeout(t._tid);
      t._tid = setTimeout(() => t.classList.remove('show'), 3500);
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Render player grid ─────────────────────────────────────────────
    function renderPlayers() {
      const players = getPlayers();
      const grid    = document.getElementById('players-grid');
      if (!players.length) {
        grid.innerHTML = `<div class="card" style="text-align:center;color:var(--mute);padding:2rem;grid-column:1/-1">
          No AI players yet. Click <strong>+ Add AI Player</strong> to spawn your first one!
        </div>`;
        renderLeaderboard(players);
        return;
      }
      grid.innerHTML = players.map(p => `
        <div class="player-card" data-id="${p.id}">
          <div class="pname">
            ${esc(p.name)}
            <span class="mute" style="font-size:0.7rem;font-weight:400">${esc(p.model)}</span>
          </div>
          <div class="stat-row">
            <span>❤️ Health</span>
            <span>${(p.health || 20).toFixed(1)}/20</span>
          </div>
          <div class="bar-wrap"><div class="bar-fill bar-health" style="width:${((p.health || 20)/20)*100}%"></div></div>
          <div class="stat-row" style="margin-top:0.4rem">
            <span>🍗 Hunger</span>
            <span>${(p.hunger || 20).toFixed(1)}/20</span>
          </div>
          <div class="bar-wrap"><div class="bar-fill bar-hunger" style="width:${((p.hunger || 20)/20)*100}%"></div></div>
          <div class="stat-row" style="margin-top:0.6rem">
            <span>📍 Position</span>
            <span class="mono">${Math.floor(p.x ?? 0)}, ${Math.floor(p.y ?? 0)}, ${Math.floor(p.z ?? 0)}</span>
          </div>
          <div class="stat-row">
            <span>⛏ Blocks Mined</span>
            <span>${p.blocksMined || 0}</span>
          </div>
          <div class="thought-bubble">${esc(p.lastThought || 'Waiting to be loaded in game…')}</div>
          <div class="player-actions">
            <a href="/game.html?follow=${p.id}" class="btn btn-primary" style="font-size:0.8rem;padding:0.4rem 0.8rem">👁 Watch</a>
            <button class="btn btn-danger" style="font-size:0.8rem;padding:0.4rem 0.8rem"
              onclick="window._deletePlayer(${p.id}, '${esc(p.name)}')">Delete</button>
          </div>
        </div>
      `).join('');
      renderLeaderboard(players);
    }

    function renderLeaderboard(players) {
      const sorted = [...players].sort((a,b) => (b.blocksMined||0) - (a.blocksMined||0));
      const body   = document.getElementById('leaderboard-body');
      if (!sorted.length) {
        body.innerHTML = '<tr><td colspan="5" style="padding:1rem;color:var(--mute)">No data yet.</td></tr>';
        return;
      }
      body.innerHTML = sorted.map((r, i) => `
        <tr style="border-top:1px solid var(--border)">
          <td style="padding:0.5rem 0.75rem;color:var(--mute)">${i+1}</td>
          <td style="padding:0.5rem 0.75rem;color:var(--accent);font-weight:700">${esc(r.name)}</td>
          <td style="padding:0.5rem 0.75rem;color:var(--mute)">${esc(r.model || '–')}</td>
          <td style="padding:0.5rem 0.75rem">${r.blocksMined || 0}</td>
          <td style="padding:0.5rem 0.75rem">${Math.floor(r.distanceTraveled || 0)}m</td>
        </tr>
      `).join('');
    }

    window._deletePlayer = (id, name) => {
      if (!confirm(`Delete AI player "${name}"? This cannot be undone.`)) return;
      removePlayer(id);
      showToast(`${name} deleted.`);
      renderPlayers();
    };

    // ── Modal ──────────────────────────────────────────────────────────
    document.getElementById('add-player-btn').addEventListener('click',
      () => document.getElementById('add-modal').classList.remove('hidden'));
    document.getElementById('cancel-modal').addEventListener('click',
      () => document.getElementById('add-modal').classList.add('hidden'));
    document.getElementById('add-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
    });

    document.querySelector('[name="model"]').addEventListener('change', (e) => {
      document.getElementById('custom-model-group').classList.toggle('hidden', e.target.value !== 'custom');
    });

    // Demo mode toggle: hide/show API key + model + URL fields
    document.getElementById('demo-mode').addEventListener('change', (e) => {
      const hide = e.target.checked;
      ['api-key-group', 'model-group', 'url-group'].forEach(id => {
        document.getElementById(id).classList.toggle('hidden', hide);
      });
    });

    document.getElementById('add-player-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.getElementById('add-submit-btn');
      btn.disabled = true; btn.textContent = 'Spawning…';
      const fd      = new FormData(e.target);
      const isDemo  = fd.get('isDemo') === 'on';
      const modelVal = isDemo ? 'demo' : (fd.get('model') === 'custom' ? fd.get('customModel').trim() : fd.get('model'));
      const apiKey   = isDemo ? 'demo' : fd.get('apiKey').trim();
      if (!isDemo && !apiKey) {
        showToast('Enter an API key or enable Demo Mode.', true);
        btn.disabled = false; btn.textContent = 'Spawn AI Player';
        return;
      }
      addPlayer({
        name:            fd.get('name').trim(),
        apiKey,
        model:           modelVal,
        providerBaseUrl: isDemo ? '' : (fd.get('providerBaseUrl').trim() || 'https://openrouter.ai/api/v1'),
        personality:     fd.get('personality').trim(),
      });
      showToast(`✅ ${fd.get('name').trim()} spawned${isDemo ? ' (Demo Mode)' : ''}!`);
      document.getElementById('add-modal').classList.add('hidden');
      e.target.reset();
      // Re-show API fields after reset
      ['api-key-group', 'model-group', 'url-group'].forEach(id => {
        document.getElementById(id).classList.remove('hidden');
      });
      btn.disabled = false; btn.textContent = 'Spawn AI Player';
      renderPlayers();
    });

    renderPlayers();
  </script>
</body>
</html>
